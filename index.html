<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Restaurante</title>

  <!-- Bootstrap desde node_modules -->
  <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
  <div id="navbar"></div>
  <div class="container pt-2">
    <div class="row g-0">
      <div class="col-md-6 text-center py-3 text-white fw-bold" style="background-color: #ff0000;">
        <i class="bi bi-truck"></i>
        QUIERO PEDIR A DOMICILIO
      </div>

      <div class="col-md-6 text-center py-3 bg-dark text-white fw-bold">
        <i class="bi bi-shop"></i>
        QUIERO RECOGER EN TIENDA
      </div>
    </div>
  </div>
  <div class="container mt-3">
    <h2 class="fw-bold">Lo Más Hot</h2>
  </div>

  <div class="container mt-2">
    <div id="myCarousel" class="carousel slide mx-auto" data-bs-ride="carousel">

      <!-- Indicators -->
      <div class="carousel-indicators">
        <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="2"></button>
      </div>

      <!-- Slides -->
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="https://www.pizzahut.com.sv/static/media/images/images/jpg/1_SM_21-03-2026-09-29.jpg"
            style="height: 600px;" class="d-block w-100" alt="Slide 1">
        </div>
        <div class="carousel-item">
          <img src="https://www.pizzahut.com.sv/static/media/images/images/jpg/1_SM_18-03-2026-09-21.jpg"
            style="height: 600px;" class="d-block w-100" alt="Slide 2">
        </div>
        <div class="carousel-item">
          <img src="https://www.pizzahut.com.sv/static/media/images/images/jpg/1_SM_18-03-2026-09-40.jpg"
            style="height: 600px;" class="d-block w-100" alt="Slide 3">
        </div>
      </div>

      <!-- Controls -->
      <button class="carousel-control-prev" type="button" data-bs-target="#myCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>

      <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </div>

  <div class="container my-4">
    <h2 class="fw-bold mb-4">Menú</h2>
    <div class="row g-4">
      <div class="col-6 col-md-3 text-center">
        <a class="card border-0" href="/src/pages/promociones.html">
          <img src="https://www.pizzahut.com.sv/static/media/images/images/jpg/1_CARD_10-04-2026-09-25-15.jpg"
            class="card-img-top rounded">
          <div class="card-body p-2">
            <p class="fw-bold">Promociones Online</p>
          </div>
        </a>
      </div>

      <div class="col-6 col-md-3 text-center">
        <a class="card border-0" href="/src/pages/menu.html">
          <img src="https://www.pizzahut.com.sv/static/media/images/images/jpg/1_CARD_16-12-2024-08-12.jpg"
            class="card-img-top rounded">
          <div class="card-body p-2">
            <p class="fw-bold">Alitas & Chunks Hut</p>
          </div>
        </a>
      </div>

      <div class="col-6 col-md-3 text-center">
        <a class="card border-0" href="/src/pages/menu.html">
          <img src="https://www.pizzahut.com.sv/static/media/images/images/jpg/1_CARD_03-06-2025-12-12.jpg"
            class="card-img-top rounded">
          <div class="card-body p-2">
            <p class="fw-bold">Arma tu Pizza</p>
          </div>
        </a>
      </div>

      <div class="col-6 col-md-3 text-center">
        <a class="card border-0" href="/src/pages/menu.html">
          <img src="https://www.pizzahut.com.sv/static/media/images/images/jpg/1_CARD_03-06-2025-12-12.jpg"
            class="card-img-top rounded">
          <div class="card-body p-2">
            <p class="fw-bold">Pizzas</p>
          </div>
        </a>
      </div>

      <div class="col-6 col-md-3 text-center">
        <a class="card border-0" href="/src/pages/menu.html">
          <img src="https://www.pizzahut.com.sv/static/media/images/images/jpg/1_CARD_03-06-2025-12-11.jpg"
            class="card-img-top rounded">
          <div class="card-body p-2">
            <p class="fw-bold">Para Compartir</p>
          </div>
        </a>
      </div>

      <div class="col-6 col-md-3 text-center">
        <a class="card border-0" href="/src/pages/menu.html">
          <img src="https://www.pizzahut.com.sv/static/media/images/images/jpg/1_CARD_19-03-2026-16-01-46.jpg"
            class="card-img-top rounded">
          <div class="card-body p-2">
            <p class="fw-bold">Combos Personales</p>
          </div>
        </a>
      </div>

      <div class="col-6 col-md-3 text-center">
        <a class="card border-0" href="/src/pages/menu.html">
          <img src="https://www.pizzahut.com.sv/static/media/images/images/jpg/1_CARD_03-06-2025-12-08.jpg"
            class="card-img-top rounded">
          <div class="card-body p-2">
            <p class="fw-bold">Entradas</p>
          </div>
        </a>
      </div>

      <div class="col-6 col-md-3 text-center">
        <a class="card border-0" href="/src/pages/menu.html">
          <img src="https://www.pizzahut.com.sv/static/media/images/images/jpg/1_CARD_10-12-2025-16-24.jpg"
            class="card-img-top rounded">
          <div class="card-body p-2">
            <p class="fw-bold">Postres</p>
          </div>
        </a>
      </div>

      <div class="col-6 col-md-3 text-center">
        <a class="card border-0" href="/src/pages/menu.html">
          <img src="https://www.pizzahut.com.sv/static/media/images/images/jpg/1_CARD_18-03-2026-09-36-12.jpg"
            class="card-img-top rounded">
          <div class="card-body p-2">
            <p class="fw-bold">Bebidas</p>
          </div>
        </a>
      </div>

      <div class="col-6 col-md-3 text-center">
        <a class="card border-0" href="/src/pages/menu.html">
          <img src="https://www.pizzahut.com.sv/static/media/images/images/jpg/1_CARD_16-07-2025-09-12.jpg"
            class="card-img-top rounded">
          <div class="card-body p-2">
            <p class="fw-bold">Productos Hut</p>
          </div>
        </a>
      </div>
    </div>
  </div>
  <div id="footer"></div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch("src/layout/navbar.html")
      .then(r => r.text())
      .then(data => {
        document.getElementById("navbar").innerHTML = data;
      });
    fetch("src/layout/footer.html")
      .then(r => r.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>
</body>

</html>
