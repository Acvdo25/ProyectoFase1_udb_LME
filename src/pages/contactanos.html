<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Restaurante</title>

    <!-- Bootstrap desde node_modules -->
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

    <div id="navbar"></div>

    <section id="contacto" class="py-5 section-soft">
        <div class="container">
            <div class="text-center mb-5">
                <h2 class="fw-bold">¡Contactanos! :)</h2>
            </div>
            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="card border-0 shadow-sm h-100 contact-panel">
                        <div class="card-body p-4">
                            <h3 class="h4 fw-bold">Datos de atención</h3>
                            <ul class="list-unstyled mb-0">
                                <li class="mb-2"><strong>Telefono:</strong> +503 1234-5678</li>
                                <li class="mb-2"><strong>Correo:</strong> contacto@pizzeria.com</li>
                                <li class="mb-2"><strong>Horario:</strong> Lunes a domingo, 10:00 a.m. - 10:00 p.m.</li>
                                <li><strong>Direccion:</strong> San Salvador, El Salvador</li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="card border-0 shadow-sm h-100 contact-panel">
                        <div class="card-body p-4">
                            <form class="row g-3">
                                <div class="col-md-6">
                                    <label for="nombre" class="form-label fw-semibold">Nombre</label>
                                    <input type="text" class="form-control" id="nombre" placeholder="Tu nombre">
                                </div>
                                <div class="col-md-6">
                                    <label for="correo" class="form-label fw-semibold">Correo electronico</label>
                                    <input type="email" class="form-control" id="correo"
                                        placeholder="correo@ejemplo.com">
                                </div>
                                <div class="col-12">
                                    <label for="mensaje" class="form-label fw-semibold">Mensaje</label>
                                    <textarea class="form-control" id="mensaje" rows="5"
                                        placeholder="Escribe tu mensaje"></textarea>
                                </div>
                                <div class="col-12">
                                    <button type="submit" class="btn btn-danger px-4">Enviar mensaje</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer id="footer"></footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        //Cargar el header
        document.addEventListener("DOMContentLoaded", function () {
            fetch("/src/layout/navbar.html")
                .then(r => r.text())
                .then(data => {
                    document.getElementById("navbar").innerHTML = data;
                });
            fetch("/src/layout/footer.html")
                .then(r => r.text())
                .then(data => {
                    document.getElementById("footer").innerHTML = data;
                });
        });
    </script>

</body>

</html>
